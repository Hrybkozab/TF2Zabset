[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  framework = "vite"
  command = "npm run dev:vite"
  targetPort = 8080
  port = 8888
  autoLaunch = false

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/guides/*"
  to = "/.netlify/functions/guides/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/guides"
  to = "/.netlify/functions/guides"
  status = 200
  force = true

# SPA fallback only in production (public/_redirects). Do NOT add "/* -> index.html"
# here — it breaks Vite dev and causes a blank white page on localhost:8888.

